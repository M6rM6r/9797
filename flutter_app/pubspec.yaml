name: arabic_coupons
description: Arabic coupon aggregator for Saudi/MENA market
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_analytics: ^12.1.3
  firebase_auth: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  firebase_crashlytics: ^5.0.8

  # Networking
  connectivity_plus: ^7.0.0

  # UI
  cached_network_image: ^3.3.0
  carousel_slider: ^5.1.2
  google_fonts: ^8.0.2
  fluttertoast: ^9.0.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # Utilities
  url_launcher: ^6.2.5
  share_plus: ^12.0.1
  intl: ^0.20.0
  flutter_cache_manager: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Black.ttf
          weight: 900

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#1a1a1a"
    theme_color: "#1e88e5"
